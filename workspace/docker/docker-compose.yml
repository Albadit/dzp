services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-dzp
    hostname: sqlserver-dzp
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${MSSQL_PASSWORD}
      - MSSQL_DATABASE=${MSSQL_DATABASE}
      - MSSQL_PID=${MSSQL_PID}
      - MSSQL_COLLATION=${MSSQL_COLLATION}
    ports:
      - "${SQLSERVER_PORT}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    networks:
      - dnn_network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${MSSQL_PASSWORD} -No -Q "SELECT 1"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-init-dzp
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - dnn_network
    environment:
      - MSSQL_PASSWORD=${MSSQL_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_COLLATION=${DB_COLLATION}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Waiting for SQL Server to be ready..."
        sleep 5
        echo "Creating database [$$DB_NAME] and user [$$DB_USER]..."
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver-dzp -U sa -P "$$MSSQL_PASSWORD" -No -Q "
          IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = N'$$DB_NAME')
          BEGIN
            CREATE DATABASE [$$DB_NAME] COLLATE $$DB_COLLATION;
            PRINT 'Database [$$DB_NAME] created.';
          END
          ELSE
            PRINT 'Database [$$DB_NAME] already exists.';

          IF NOT EXISTS (SELECT name FROM sys.server_principals WHERE name = N'$$DB_USER')
          BEGIN
            CREATE LOGIN [$$DB_USER] WITH PASSWORD = N'$$DB_PASSWORD', DEFAULT_DATABASE = [$$DB_NAME];
            PRINT 'Login [$$DB_USER] created.';
          END
          ELSE
            PRINT 'Login [$$DB_USER] already exists.';
        "
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver-dzp -U sa -P "$$MSSQL_PASSWORD" -No -d "$$DB_NAME" -Q "
          IF NOT EXISTS (SELECT name FROM sys.database_principals WHERE name = N'$$DB_USER')
          BEGIN
            CREATE USER [$$DB_USER] FOR LOGIN [$$DB_USER];
            ALTER ROLE db_owner ADD MEMBER [$$DB_USER];
            PRINT 'User [$$DB_USER] added to [$$DB_NAME] as db_owner.';
          END
          ELSE
            PRINT 'User [$$DB_USER] already exists in [$$DB_NAME].';
        "
        echo "Database configuration complete."
    restart: "no"

volumes:
  sqlserver_data:
    driver: local

networks:
  dnn_network:
    driver: bridge
