<style type="text/tailwindcss">
/* ==========================================================================
   Base Styles
   ========================================================================== */

@layer base {
  /* Base body styles */
  body {
    font-family: var(--font-inter);
    color: var(--layout-foreground);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Smooth scrolling */
  html {
    scroll-behavior: smooth;
  }
}

/* ==========================================================================
   Global Components
   ========================================================================== */

@layer components {

}

/* ==========================================================================
   Header Overrides
   ========================================================================== */

@layer components {
  .hamburger {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 2rem;
    height: 2rem;
    padding: 0;
    background: none;
    border: none;
    cursor: pointer;
    gap: 5px;
  }

  .hamburger span {
    display: block;
    width: 1.25rem;
    height: 2px;
    background-color: var(--layout-background);
    border-radius: 1px;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }

  .hamburger.open span:nth-child(1) {
    transform: translateY(7px) rotate(45deg);
  }

  .hamburger.open span:nth-child(2) {
    opacity: 0;
  }

  .hamburger.open span:nth-child(3) {
    transform: translateY(-7px) rotate(-45deg);
  }
}

/* Mobile menu: toggle visibility (no animation) */
#mobile-menu {
  display: none;
  overflow: hidden;
}

#mobile-menu.open {
  display: block;
}

/* Mobile menu: stack items vertically */
#mobile-menu ul {
  flex-direction: column;
  align-items: stretch;
  gap: 0.125rem;
}

#mobile-menu > div > ul > li > a,
#mobile-menu > div > ul > li > span {
  width: 100%;
  justify-content: flex-start;
  padding: 0.75rem 1rem;
  border-radius: 0.375rem;
}

#mobile-menu > div > ul > li > a:hover {
  background-color: var(--flat-default-300);
}

/* Hide the desktop dropdown chevron on mobile */
#mobile-menu > div > ul > li > a > svg {
  display: none;
}

/* Make sub-menus always visible on mobile (no hover needed) */
#mobile-menu .group > div {
  position: static;
  visibility: visible;
  opacity: 1;
  width: 100%;
  background: transparent;
  box-shadow: none;
  ring: unset;
  margin-top: 0;
  border-radius: 0;
}

#mobile-menu .group > div ul {
  padding: 0;
}

#mobile-menu .group > div ul li a {
  color: var(--foreground-500);
  background: transparent;
  padding-left: 2rem;
  font-size: 0.875rem;
}

#mobile-menu .group > div ul li a:hover {
  color: var(--layout-foreground);
  background-color: var(--flat-default-300);
}

/* Remove ring/shadow from mobile sub-menus */
#mobile-menu .group > div {
  --tw-ring-shadow: none;
  --tw-shadow: none;
  box-shadow: none;
}
</style>
